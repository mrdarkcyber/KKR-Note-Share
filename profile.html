<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – KKR Note-Share Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="toast-container"></div>

<div class="app-layout" id="app-layout">
  <div class="main-content" id="main-content">
    <div class="page-header">
      <h2>👤 My Profile</h2>
    </div>

    <div class="page-body">
      <!-- Profile header banner -->
      <div class="profile-header">
        <div class="profile-avatar-lg" id="p-avatar">??</div>
        <div class="profile-info">
          <h3 id="p-name">Loading…</h3>
          <p id="p-email"></p>
          <p id="p-branch-year" style="color:rgba(255,255,255,.4);margin-top:4px"></p>
          <span id="admin-badge" class="admin-badge hidden">⭐ ADMIN</span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:800px">
        <!-- Edit profile card -->
        <div class="upload-card" style="grid-column:1/-1">
          <h3>Edit Profile</h3>
          <p class="upload-desc">Update your display name, branch, and year.</p>

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="edit-name" placeholder="Your full name" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Branch</label>
              <select id="edit-branch">
                <option value="">Not set</option>
                <option>CSE</option><option>ECE</option><option>EE</option>
                <option>ME</option><option>CE</option><option>IT</option>
                <option>CH</option><option>BT</option>
              </select>
            </div>
            <div class="form-group">
              <label>Year</label>
              <select id="edit-year">
                <option value="">Not set</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary" id="save-btn" style="max-width:180px">Save Changes</button>
        </div>
      </div>

      <!-- My uploads + Admin tabs -->
      <div style="margin-top:36px">
        <h3 style="font-size:1.2rem;margin-bottom:20px">My Uploads</h3>

        <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
          <button class="btn btn-amber btn-sm tab-toggle active" data-tab="my-notes">My Notes</button>
          <button class="btn btn-outline btn-sm tab-toggle" data-tab="my-books">My Textbooks</button>
          <!-- Admin tab: shown only if user is admin -->
          <button class="btn btn-outline btn-sm tab-toggle hidden" id="admin-tab-btn" data-tab="admin-panel"
            style="border-color:var(--amber,#f59e0b);color:var(--amber,#f59e0b)">
            ⭐ Admin Panel
          </button>
        </div>

        <div id="my-notes" class="resource-grid">
          <p style="color:var(--text-soft)">Loading…</p>
        </div>
        <div id="my-books" class="resource-grid hidden">
          <p style="color:var(--text-soft)">Loading…</p>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel" class="hidden">
          <div class="upload-card" style="max-width:600px">
            <h3>⭐ Admin Management</h3>
            <p class="upload-desc">Grant or revoke admin privileges by roll number.</p>

            <div class="form-group" style="margin-top:16px">
              <label>Roll Number</label>
              <input type="text" id="admin-roll-input" placeholder="e.g. 124302001"
                maxlength="9" style="letter-spacing:.05em" />
              <p class="form-hint">Enter the 9-digit roll number of the student.</p>
            </div>

            <div class="admin-actions">
              <button class="btn btn-primary" id="grant-admin-btn">Grant Admin</button>
              <button class="btn btn-danger btn-sm" id="revoke-admin-btn"
                style="padding:8px 18px">Revoke Admin</button>
            </div>

            <div id="admin-result" class="admin-result"></div>
          </div>

          <!-- Current admins list -->
          <div class="upload-card" style="max-width:600px;margin-top:20px">
            <h3>Current Admins</h3>
            <div id="admin-list" style="margin-top:12px">
              <p style="color:var(--text-soft)">Loading…</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>
<script>
let currentUser = null;
let currentProfile = null;

(async () => {
  document.getElementById('app-layout').insertAdjacentHTML('afterbegin', renderSidebar());
  document.getElementById('main-content').insertAdjacentHTML('afterbegin', renderMobileHeader('Profile'));
  const { user } = await initShell('profile');
  currentUser = user;

  const profile = await getProfile(user.id).catch(() => null);
  currentProfile = profile;
  populateProfile(user, profile);

  // Show admin badge + tab if admin
  if (profile?.is_admin) {
    document.getElementById('admin-badge').classList.remove('hidden');
    document.getElementById('admin-badge').style.display = 'inline-block';
    document.getElementById('admin-tab-btn').classList.remove('hidden');
    loadAdminList();
  }

  // Tab switching
  document.querySelectorAll('.tab-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-toggle').forEach(b => {
        b.classList.remove('active');
        b.classList.add('btn-outline');
        b.classList.remove('btn-amber');
      });
      btn.classList.add('active', 'btn-amber');
      btn.classList.remove('btn-outline');
      const which = btn.dataset.tab;
      document.getElementById('my-notes').classList.toggle('hidden', which !== 'my-notes');
      document.getElementById('my-books').classList.toggle('hidden', which !== 'my-books');
      document.getElementById('admin-panel').classList.toggle('hidden', which !== 'admin-panel');
    });
  });

  // Save profile
  document.getElementById('save-btn').addEventListener('click', async () => {
    const name   = document.getElementById('edit-name').value.trim();
    const branch = document.getElementById('edit-branch').value;
    const year   = document.getElementById('edit-year').value;
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await updateProfile(user.id, {
        full_name: name || null,
        branch: branch || null,
        year: year ? Number(year) : null
      });
      showToast('Profile updated!', 'success');
      document.getElementById('p-name').textContent = name || user.email.split('@')[0];
      document.getElementById('p-avatar').textContent = (name || user.email).slice(0,2).toUpperCase();
    } catch(e) {
      showToast(e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  });

  // My uploads
  const [myNotes, myBooks] = await Promise.all([
    getNotes().then(ns => ns.filter(n => n.uploaded_by === user.id)),
    getTextbooks().then(bs => bs.filter(b => b.uploaded_by === user.id))
  ]);

  renderMyGrid(myNotes, 'my-notes', 'notes');
  renderMyGrid(myBooks, 'my-books', 'textbooks');

  // ── Admin actions ─────────────────────────────────────────
  document.getElementById('grant-admin-btn').addEventListener('click', () => setAdminAction(true));
  document.getElementById('revoke-admin-btn').addEventListener('click', () => setAdminAction(false));
})();

async function setAdminAction(grant) {
  const rollNo = document.getElementById('admin-roll-input').value.trim();
  const resultEl = document.getElementById('admin-result');

  if (!/^\d{9}$/.test(rollNo)) {
    showResult(resultEl, 'error', '❌ Enter a valid 9-digit roll number.');
    return;
  }
  if (rollNo === currentProfile?.roll_no && !grant) {
    showResult(resultEl, 'error', '❌ You cannot revoke your own admin access.');
    return;
  }

  const grantBtn  = document.getElementById('grant-admin-btn');
  const revokeBtn = document.getElementById('revoke-admin-btn');
  grantBtn.disabled = true; revokeBtn.disabled = true;

  try {
  if (grant) {
  await grantAdmin(rollNo);
} else {
  await revokeAdmin(rollNo);
}
    showResult(resultEl, 'success',
      grant
        ? `✅ ${rollNo} is now an admin.`
        : `✅ Admin access revoked for ${rollNo}.`
    );
    document.getElementById('admin-roll-input').value = '';
    loadAdminList();
  } catch(e) {
    showResult(resultEl, 'error', '❌ ' + e.message);
  } finally {
    grantBtn.disabled = false; revokeBtn.disabled = false;
  }
}

function showResult(el, type, msg) {
  el.style.display = 'block';
  el.className = `admin-result ${type}`;
  el.textContent = msg;
  setTimeout(() => { el.style.display = 'none'; el.className = 'admin-result'; }, 4000);
}

async function loadAdminList() {
  const listEl = document.getElementById('admin-list');
  try {
    const { data, error } = await sb
      .from('profiles')
      .select('roll_no, full_name, email')
      .eq('is_admin', true)
      .order('roll_no');
    if (error) throw error;

    if (!data.length) {
      listEl.innerHTML = '<p style="color:var(--text-soft)">No admins found.</p>';
      return;
    }

    listEl.innerHTML = data.map(a => `
      <div class="admin-list-row">
        <div>
          <div class="admin-list-name">${a.full_name || a.roll_no}</div>
          <div class="admin-list-email">${a.email}</div>
        </div>
        <span class="admin-list-badge">⭐ Admin</span>
      </div>
    `).join('');
  } catch(e) {
    listEl.innerHTML = '<p style="color:var(--text-soft)">Could not load admin list.</p>';
  }
}

function populateProfile(user, profile) {
  const roll = user.email.split('@')[0];
  const name = profile?.full_name || roll;
  document.getElementById('p-avatar').textContent  = name.slice(0,2).toUpperCase();
  document.getElementById('p-name').textContent    = name;
  document.getElementById('p-email').textContent   = user.email;
  document.getElementById('p-branch-year').textContent =
    [profile?.branch, profile?.year ? `Year ${profile.year}` : ''].filter(Boolean).join(' · ');
  if (profile?.full_name) document.getElementById('edit-name').value   = profile.full_name;
  if (profile?.branch)    document.getElementById('edit-branch').value = profile.branch;
  if (profile?.year)      document.getElementById('edit-year').value   = profile.year;
}

function renderMyGrid(items, containerId, table) {
  const grid = document.getElementById(containerId);
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📭</div>
      <h3>Nothing uploaded yet</h3>
      <p>Share your first ${table === 'notes' ? 'notes' : 'textbook'} with your batch-mates!</p>
    </div>`;
    return;
  }
  grid.innerHTML = items.map(r => {
    const c = r.courses;
    const isBook = !!r.author;
    return `
    <div class="resource-card">
      <div class="rc-top">
        <div class="rc-pdf-icon">📄</div>
        <span class="rc-badge ${isBook ? 'amber' : ''}">${isBook ? 'Textbook' : 'Notes'}</span>
      </div>
      <div class="rc-title">${r.title}</div>
      ${r.author ? `<div class="rc-meta">✍️ ${r.author}</div>` : ''}
      ${c ? `<div class="rc-meta">📚 ${c.code} – ${c.name}</div>` : ''}
      <div class="rc-meta">🕐 ${timeAgo(r.created_at)} · ${fmtBytes(r.file_size)}</div>
      <div class="rc-footer">
        <span class="rc-downloads">⬇️ ${r.downloads || 0}</span>
        <div class="rc-actions">
          <button class="btn btn-amber btn-sm download-btn"
            data-id="${r.id}" data-path="${r.storage_path}"
            data-bucket="${table}" data-table="${table}">
            View
          </button>
          <button class="btn btn-danger btn-sm delete-btn"
            data-id="${r.id}" data-path="${r.storage_path}"
            data-bucket="${table}" data-table="${table}">
            Delete
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.download-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      try {
        const url = await getSignedURL(btn.dataset.bucket, btn.dataset.path);
        window.open(url, '_blank');
      } catch(e) { showToast('Could not get link.', 'error'); }
    });
  });

  grid.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this upload permanently?')) return;
      try {
        await sb.storage.from(btn.dataset.bucket).remove([btn.dataset.path]);
        await sb.from(btn.dataset.table).delete().eq('id', btn.dataset.id);
        btn.closest('.resource-card').remove();
        showToast('Deleted.', 'success');
      } catch(e) { showToast(e.message, 'error'); }
    });
  });
}
</script>
</body>
</html>
